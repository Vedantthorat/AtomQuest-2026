<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; }
      .box { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; }
      .box-dark { fill: #1e293b; stroke: #64748b; stroke-width: 2; }
      .box-accent { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .box-db { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .box-ai { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .line { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .solid-line { stroke: #475569; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">AtomTrack AI - System Architecture</text>

  <!-- CLIENT LAYER -->
  <rect x="50" y="50" width="700" height="80" rx="10" class="box" fill="#e0f2fe"/>
  <text x="400" y="75" text-anchor="middle" class="label" font-weight="bold" font-size="14">CLIENT (React SPA)</text>
  <text x="400" y="95" text-anchor="middle" class="label">React 18 + TypeScript + Vite + Tailwind + Zustand + Recharts + React Router</text>

  <!-- Arrow down -->
  <line x1="400" y1="130" x2="400" y2="150" class="solid-line"/>
  <polygon points="400,155 395,145 405,145" fill="#475569"/>

  <!-- BACKEND LAYER -->
  <rect x="50" y="155" width="700" height="200" rx="10" class="box" fill="#f8fafc"/>
  <text x="400" y="180" text-anchor="middle" class="label" font-weight="bold" font-size="14">BACKEND (Express.js)</text>

  <!-- API Modules -->
  <rect x="70" y="195" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="130" y="220" text-anchor="middle" class="label">Auth API</text>
  <text x="130" y="235" text-anchor="middle" class="label" font-size="10">(JWT)</text>

  <rect x="205" y="195" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="265" y="220" text-anchor="middle" class="label">Goals API</text>
  <text x="265" y="235" text-anchor="middle" class="label" font-size="10">(CRUD)</text>

  <rect x="340" y="195" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="400" y="220" text-anchor="middle" class="label">Analytics API</text>
  <text x="400" y="235" text-anchor="middle" class="label" font-size="10">(Charts)</text>

  <rect x="475" y="195" width="120" height="50" rx="5" fill="#fed7aa" stroke="#ea580c"/>
  <text x="535" y="220" text-anchor="middle" class="label">AI API</text>
  <text x="535" y="235" text-anchor="middle" class="label" font-size="10">(Claude)</text>

  <rect x="630" y="195" width="100" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="680" y="220" text-anchor="middle" class="label">Admin API</text>
  <text x="680" y="235" text-anchor="middle" class="label" font-size="10">(Settings)</text>

  <!-- Second row -->
  <rect x="70" y="260" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="130" y="285" text-anchor="middle" class="label">Approvals API</text>
  <text x="130" y="300" text-anchor="middle" class="label" font-size="10">(Workflow)</text>

  <rect x="205" y="260" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="265" y="285" text-anchor="middle" class="label">Escalation API</text>
  <text x="265" y="300" text-anchor="middle" class="label" font-size="10">(Auto-L1/L2/L3)</text>

  <rect x="340" y="260" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="400" y="285" text-anchor="middle" class="label">Audit API</text>
  <text x="400" y="300" text-anchor="middle" class="label" font-size="10">(Logging)</text>

  <rect x="475" y="260" width="120" height="50" rx="5" fill="#ddd" stroke="#666"/>
  <text x="535" y="285" text-anchor="middle" class="label">Notifications</text>
  <text x="535" y="300" text-anchor="middle" class="label" font-size="10">(Real-time)</text>

  <!-- Socket.IO Box -->
  <rect x="610" y="260" width="120" height="50" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="670" y="285" text-anchor="middle" class="label">Socket.IO</text>
  <text x="670" y="300" text-anchor="middle" class="label" font-size="10">(WebSocket)</text>

  <!-- Arrow down -->
  <line x1="400" y1="355" x2="400" y2="375" class="solid-line"/>
  <polygon points="400,380 395,370 405,370" fill="#475569"/>

  <!-- DATABASE LAYER -->
  <rect x="200" y="380" width="400" height="70" rx="10" class="box-db"/>
  <text x="400" y="405" text-anchor="middle" class="label" font-weight="bold" font-size="14">DATABASE (PostgreSQL)</text>
  <text x="400" y="425" text-anchor="middle" class="label">Prisma ORM | Users | Goals | Check-ins | Notifications | Audit | Escalations</text>

  <!-- Arrow to External -->
  <line x1="400" y1="450" x2="400" y2="470" class="line"/>
  <polygon points="400,475 395,465 405,465" fill="#94a3b8"/>

  <!-- EXTERNAL APIs -->
  <rect x="250" y="480" width="300" height="50" rx="10" class="box-ai"/>
  <text x="400" y="505" text-anchor="middle" class="label" font-weight="bold" font-size="14">EXTERNAL APIs</text>
  <text x="400" y="522" text-anchor="middle" class="label">Anthropic Claude Haiku (AI Goal Generation &amp; Q&amp;A)</text>

  <!-- Legend -->
  <rect x="50" y="540" width="700" height="40" rx="5" fill="#f1f5f9"/>
  <text x="60" y="560" class="label" font-weight="bold">Highlights:</text>
  <text x="60" y="575" class="label">• Modular Express routes with middleware pattern • JWT auth with role-based access control • 24-hour AI response caching • Real-time Socket.IO notifications</text>
</svg>